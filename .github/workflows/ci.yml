name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        # 含 server extra(uvicorn):serve 子命令测试 + mypy 需要,否则 CI 一直红
        run: python -m pip install -e ".[dev,server]"
      - name: Ruff
        run: python -m ruff check .
      - name: Mypy
        run: python -m mypy agent_ctl
      - name: Pytest
        # 覆盖率棘轮:当前 ~92%,门槛设 90 只防回退、不卡现状;升上去后可逐步抬高。
        run: python -m pytest -q --cov=agent_ctl --cov-report=term-missing --cov-fail-under=90
