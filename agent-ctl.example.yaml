routes:
  default: [anthropic/claude-opus-4-8, anthropic/claude-sonnet-4-6]
# 裸模型名 → provider/model:OpenAI 兼容 server 收到这些 model 名时路由到对应 provider。
# 客户端只发熟悉的模型名即可;含 "/" 的会被当 provider/model 直连(无需在此登记)。
model_aliases:
  claude-opus-4-8: anthropic/claude-opus-4-8
  claude-sonnet-4-6: anthropic/claude-sonnet-4-6
  gpt-4o: openai/gpt-4o
  deepseek-chat: deepseek/deepseek-chat
  qwen-max: qwen/qwen-max
  glm-4: glm/glm-4
prices:                 # [input_per_1M_usd, output_per_1M_usd]
  claude-opus-4-8: [5.0, 25.0]
  claude-sonnet-4-6: [3.0, 15.0]
cache_enabled: true
cache_ttl_s: 600
cache_tool_responses: false
# 捕获落库移出请求主路径(后台线程);关闭则同步落库(测试/确定性可读)
capture_async: true
# 按 provider 熔断:连续失败达阈值开路冷却,回退链跳过。0=关闭
circuit_failure_threshold: 5
circuit_cooldown_s: 30
# 单次调用墙钟总预算(秒),封顶 重试×回退×单目标超时;0=不封顶
request_deadline_s: 120
# 成本预算闸(USD,进程内累计):per-consumer 上限 + 全局上限。达限短路返 402
budgets: {}
  # ops-agent: 5.0
  # rag: 2.0
budget_global: null
profile: dev
db_path: .agent_ctl/capture.db
retry:
  max_attempts_per_target: 2
  base_backoff_s: 0.2
  jitter_ratio: 0.2
  timeout_s: 60
